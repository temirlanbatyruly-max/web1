<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup</title>
    <style>
        :root{
            --bg-dark:#000000;
            --bg-card:#0D0D0D;
            --accept-red:#EE2C38;
            --text-light:#FFFFFF; 
            --text-muted:#8F8F8F;
            --border:#262626;
        }

        body{
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 24px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .logo{
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 800;
        }
        .logo svg{
            fill: var(--accept-red);
            width: 24px;
            height: 24px;
        }
        .add-item{
            background-color: var(--accept-red);
            color: var(--text-light);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        } 
        .dashboard-grid{
            display: grid;
            grid-template-columns: 2fr 2fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        .stats-grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .card{
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        .card-stat{
            color: var(--text-light);
            font-size: 32px;
            font-weight: 800;
            margin: 0;
        }
        .card-title{
            color: var(--text-muted);
            margin: 0 0 12px 0;
            font-size: 14px;
        }
        .chart-card h2{ margin: 0; font-size: 18px;}
        .chart-placeholder{
            height: 180px;
            background: linear-gradient(180deg, rgha(238,44,56, 0.1));
            border: 2px dashed rgha(238,44,56, 0.5);
            border-radius: 8px;
            margin-top: 16px;
            color: var(--accept-red);
            display: flex; 
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .session-card h2{ margin-bottom: 16px; font-size: 18px;}
        .session-table{
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .session-table th{text-align: left;color: var(--text-muted);font-weight: 500;padding: 12px 0; text-transform: uppercase;}
        .session-table td{padding: 12px 0; border-bottom: 1px solid var(--border);}
        .status-tag{
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 11px;
            display: inline-block;
        }
        .tag-prog{}
        </style>
</head>
<body>
    
</body>
</html>
