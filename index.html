<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator</title>
    <style>
        body {
            background-color: #e3f3fd;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        .container{
          background-color: wheat;
          display: flex;
          max-width: 800px;
          border-radius: 20px;
          overflow: hidden;
        }

        .form-side {
            padding: 40px;
            width: 50%;
        }
        .results-side {
        background-color: black;
        color:aqua;
        padding: 40px;
        width: 50%;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px;
            border-radius: 4px;
        }
        button {
            background-color: #d8db2f;
            border-top: 30px;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;

        }
        
        .results-box{
            background: rgba(0, 0, 0, 0.3);
            border-top: 4px solid #d8db2f;
            padding:20px;
            margin-top: 20px;
            border-radius: 8px;
        }

        .price-large { color:#d8db2f; font-size: 45px; font-weight: bold;}
    </style>
</head>
<body>
    <div class="form-side">
        <h1>Mortgage Calculator </h1>
        <label>Mortgage Amount ($)</label>
        <input type="number" id="amount" value="300000">
        <label>Term (Years)</label>
         <input type="number" id="Term" value="25">
         <label>Interest Rate(%)</label>
         <input type="number" id="rate" value="5.25">
         <buttom onclick="calculate()">Calculate Repayments</buttom>
    </div>
    <div class="results-side">
        <h2>Your results</h2>
        <p>Your montly repayments are shown below:</p>
        <div class="results-box">
            <p>Montly Repayments</p>
            <div class="price-large" id="out-montly">$1,342.54</div>
            <hr>
            <p>Total Repayments</p>
            <div id="out-total">$543,344.45</div>
        </div>
</body>
</html>
